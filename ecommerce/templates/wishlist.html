<!DOCTYPE html>
<html>
<head>
    <title>Wishlist</title>
</head>
<body>

<h1>❤️ My Wishlist</h1>

{% for item in items %}

<div>

<h3>{{ item.product.name }}</h3>

<p>₹{{ item.product.price }}</p>

<img src="{{ item.product.image.url }}" width="200">

<hr>

</div>

{% empty %}

<p>No products in your wishlist.</p>

{% endfor %}

<br>

<a href="/">⬅ Back to Home</a>

</body>
</html>
