<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:70%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        img{
            width:300px;
            border-radius:10px;
        }

        .price{
            color:green;
            font-size:28px;
            font-weight:bold;
        }

        .btn{
            display:inline-block;
            padding:12px 20px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>

</head>

<body>

<div class="container">

<h1>{{ product.name }}</h1>

<img src="{{ product.image.url }}" alt="{{ product.name }}">

<p>{{ product.description }}</p>

<p class="price">
₹{{ product.price }}
</p>

<p>
Stock : {{ product.stock }}
</p>

<a href="/cart/" class="btn">
🛒 Add to Cart
</a>

<br><br>

<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
