<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha E-Commerce Store</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#007bff;
            color:white;
            text-align:center;
            padding:25px;
        }

        .container{
            width:90%;
            margin:30px auto;
        }

        .search-box{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:30px;
            flex-wrap:wrap;
        }

        .search-box input,
        .search-box select{
            padding:10px;
            width:220px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .search-box button{
            padding:10px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .search-box button:hover{
            background:#218838;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            overflow:hidden;
            transition:.3s;
        }

        .card:hover{
            transform:scale(1.03);
        }

        .card img{
            width:100%;
            height:230px;
            object-fit:cover;
        }

        .card-body{
            padding:15px;
        }

        .card-body h3{
            margin-bottom:10px;
        }

        .card-body h3 a{
            text-decoration:none;
            color:black;
        }

        .card-body h3 a:hover{
            color:#007bff;
        }

        .price{
            color:green;
            font-size:22px;
            font-weight:bold;
            margin:10px 0;
        }

        .stock{
            color:#555;
            margin-bottom:15px;
        }

        .btn{
            display:block;
            width:100%;
            text-align:center;
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:10px;
            border-radius:5px;
            margin-bottom:10px;
        }

        .btn:hover{
            background:#0056b3;
        }

        .wishlist-btn{
            background:#dc3545;
        }

        .wishlist-btn:hover{
            background:#b02a37;
        }

        .empty{
            text-align:center;
            font-size:22px;
            color:red;
            margin-top:40px;
        }
    </style>
</head>

<body>

<header>
    <h1>🛒 CodeAlpha E-Commerce Store</h1>
</header>

<div class="container">

    <form method="GET" class="search-box">

        <input
            type="text"
            name="q"
            placeholder="Search products..."
            value="{{ request.GET.q }}"
        >

        <select name="category">
            <option value="">All Categories</option>

            {% for category in categories %}

            <option value="{{ category.id }}"
            {% if request.GET.category == category.id|stringformat:"s" %}
                selected
            {% endif %}
            >
                {{ category.name }}
            </option>

            {% endfor %}

        </select>

        <button type="submit">Search</button>

    </form>

    <div class="products">

        {% for product in products %}

        <div class="card">

            <img src="{{ product.image.url }}" alt="{{ product.name }}">

            <div class="card-body">

                <h3>
                    <a href="{% url 'product_detail' product.id %}">
                        {{ product.name }}
                    </a>
                </h3>

                <p>{{ product.description }}</p>

                <p class="price">
                    ₹{{ product.price }}
                </p>

                <p class="stock">
                    Stock : {{ product.stock }}
                </p>

                <!-- UPDATED ADD TO CART BUTTON -->

                <a href="{% url 'add_to_cart' product.id %}" class="btn">
                    🛒 Add to Cart
                </a>

                <a href="{% url 'add_to_wishlist' product.id %}" class="btn wishlist-btn">
                    ❤️ Add to Wishlist
                </a>

            </div>

        </div>

        {% empty %}

        <div class="empty">
            No products found.
        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
